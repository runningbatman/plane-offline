name: Build Plane Offline Package
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Pull all required images
        run: |
          docker pull makeplane/plane-frontend:v2.10.0
          docker pull makeplane/plane-api:v2.10.0
          docker pull makeplane/plane-worker:v2.10.0
          docker pull makeplane/plane-proxy:v2.10.0
          docker pull postgres:15-alpine
          docker pull redis:7-alpine
          docker pull minio/minio:latest

      - name: Save images to tar archive
        run: |
          docker save -o plane-offline-images.tar \
            makeplane/plane-frontend:v2.10.0 \
            makeplane/plane-api:v2.10.0 \
            makeplane/plane-worker:v2.10.0 \
            makeplane/plane-proxy:v2.10.0 \
            postgres:15-alpine \
            redis:7-alpine \
            minio/minio:latest

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plane-offline-package
          path: plane-offline-images.tar
          retention-days: 30
