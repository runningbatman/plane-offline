name: Export Plane Images
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pull all images from GitHub Registry
        run: |
          docker pull ghcr.io/makeplane/plane-frontend:stable
          docker pull ghcr.io/makeplane/plane-api:stable
          docker pull ghcr.io/makeplane/plane-worker:stable
          docker pull ghcr.io/makeplane/plane-proxy:stable
          docker pull postgres:15
          docker pull redis:7
          docker pull minio/minio:latest

      - name: Rename to original names
        run: |
          docker tag ghcr.io/makeplane/plane-frontend:stable makeplane/plane-frontend:stable
          docker tag ghcr.io/makeplane/plane-api:stable makeplane/plane-api:stable
          docker tag ghcr.io/makeplane/plane-worker:stable makeplane/plane-worker:stable
          docker tag ghcr.io/makeplane/plane-proxy:stable makeplane/plane-proxy:stable

      - name: Save to tar file
        run: |
          docker save -o plane-offline-images.tar \
            makeplane/plane-frontend:stable \
            makeplane/plane-api:stable \
            makeplane/plane-worker:stable \
            makeplane/plane-proxy:stable \
            postgres:15 redis:7 minio/minio:latest

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plane-offline-images
          path: plane-offline-images.tar
          retention-days: 7
