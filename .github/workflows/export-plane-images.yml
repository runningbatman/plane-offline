name: Export Plane Offline Images
on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Pull all Plane images
        run: |
          docker pull makeplane/plane-frontend:stable
          docker pull makeplane/plane-api:stable
          docker pull makeplane/plane-worker:stable
          docker pull makeplane/plane-proxy:stable
          docker pull postgres:15
          docker pull redis:7
          docker pull minio/minio:latest

      - name: Save images to tar file
        run: |
          docker save -o plane-offline-images.tar \
            makeplane/plane-frontend:stable \
            makeplane/plane-api:stable \
            makeplane/plane-worker:stable \
            makeplane/plane-proxy:stable \
            postgres:15 redis:7 minio/minio:latest

      - name: Upload tar file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: plane-offline-images
          path: plane-offline-images.tar
          retention-days: 7
